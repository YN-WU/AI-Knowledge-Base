server {
    listen       80;
    listen  [::]:80;
    server_name  _;
    root   /usr/share/nginx/html;
    index  index.html;

    # Legacy Netlify path: /issues/018.html → /tvbs-ai-newsletter/issues/018.html
    # 救：dashboard.js 寫死的卡片連結、所有舊 Outlook 信件深層連結
    location ^~ /issues/ {
        rewrite ^/issues/(.*)$ /tvbs-ai-newsletter/issues/$1 last;
    }

    # Legacy Netlify path: /outlook version/...
    location ^~ "/outlook version/" {
        rewrite "^/outlook version/(.*)$" "/tvbs-ai-newsletter/outlook version/$1" last;
    }

    # Root 直連的舊檔（純單檔 redirect）
    location = /notebooklm-guide.html {
        return 301 /tvbs-ai-newsletter/notebooklm-guide.html;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        internal;
    }
}
